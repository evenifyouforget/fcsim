# Workflow for CI checks on PRs and deployment to GitHub Pages on push to main
name: CI/CD Pipeline for Pages

on:
  push:
    branches: ["main", "v6-deploy"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # ── Checkout v6-deploy (frozen artifacts) and merge main on top ──────────
      - name: Checkout v6-deploy
        uses: actions/checkout@v4
        with:
          ref: v6-deploy
          fetch-depth: 0

      - name: Fetch all tags
        run: git fetch --force --tags

      - name: Merge main into v6-deploy
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions Bot"
          git fetch origin main
          git merge origin/main --no-edit -Xtheirs

      # ── Build main (the merged checkout above) ──────────────────────────────
      - name: Cache venv for main
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-main-${{ hashFiles('requirements*.txt', 'install_requirements.sh') }}

      - name: Install requirements (main)
        run: bash install_requirements.sh

      - name: Add venv to PATH
        run: echo "$PWD/.venv/bin" >> $GITHUB_PATH

      - name: Build main with scons
        run: scons

      # ── Build each feature branch listed in deploy.json ─────────────────────
      - name: Build feature branches
        env:
          VENV_CACHE_DIR: ${{ github.workspace }}/.venv-cache
        run: bash scripts/build_subdirs.sh html

      # ── Upload and deploy ────────────────────────────────────────────────────
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'html/'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
