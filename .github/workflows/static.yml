# Workflow for CI checks on PRs and deployment to GitHub Pages on push to main
name: CI/CD Pipeline for Pages

on:
  push:
    branches: ["main", "v6-deploy"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # ── Checkout v6-deploy (frozen artifacts) and merge main on top ──────────
      - name: Checkout v6-deploy
        uses: actions/checkout@v4
        with:
          ref: v6-deploy
          fetch-depth: 0

      - name: Fetch all tags
        run: git fetch --force --tags

      - name: Merge main into v6-deploy
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions Bot"
          git fetch origin main
          git merge origin/main --no-edit -Xtheirs

      # ── Build main (the merged checkout above) ──────────────────────────────
      - name: Cache venv for main
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-main-${{ hashFiles('requirements*.txt', 'install_requirements.sh') }}

      - name: Install requirements (main)
        run: bash install_requirements.sh

      - name: Add venv to PATH
        run: echo "$PWD/.venv/bin" >> $GITHUB_PATH

      - name: Build main with scons
        run: scons

      # ── Build each feature branch listed in deploy.json ─────────────────────
      - name: Build feature branches
        run: |
          set -euo pipefail

          DEPLOY_JSON="deploy.json"

          # Parse deploy.json: iterate over key/value pairs.
          # Keys are subdirectory names; values are branch names (string) or null (frozen artifact).
          while IFS="=" read -r dir branch; do
            if [ "$branch" = "null" ]; then
              echo "Skipping $dir: frozen artifact (null branch)"
              continue
            fi

            echo "=== Building feature branch '$branch' into html/$dir/ ==="

            WORK_DIR="$(mktemp -d)"
            git clone --local --no-hardlinks --branch "$branch" . "$WORK_DIR"

            (
              cd "$WORK_DIR"

              # Separate cached venv keyed on branch + requirements hash
              REQ_HASH=$(sha256sum requirements*.txt install_requirements.sh 2>/dev/null | sha256sum | cut -c1-16 || echo "nohash")
              CACHE_KEY="venv-${branch//\//-}-${REQ_HASH}"

              # Restore venv from cache directory if available
              CACHE_DIR="$GITHUB_WORKSPACE/.venv-cache/$CACHE_KEY"
              if [ -d "$CACHE_DIR" ]; then
                echo "Restoring venv from cache: $CACHE_KEY"
                cp -a "$CACHE_DIR" .venv
              fi

              bash install_requirements.sh
              export PATH="$PWD/.venv/bin:$PATH"

              # Save venv back to cache
              mkdir -p "$CACHE_DIR"
              cp -a .venv "$CACHE_DIR"

              scons || true
            ) || true

            # Copy html/ into the subdir regardless of build success
            mkdir -p "html/$dir"
            if [ -d "$WORK_DIR/html" ]; then
              cp -r "$WORK_DIR/html/." "html/$dir/"
              echo "Copied html/ for $dir"
            else
              echo "WARNING: $WORK_DIR/html does not exist for branch $branch; subdir will be empty"
            fi

            rm -rf "$WORK_DIR"
          done < <(python3 -c "
          import json, sys
          data = json.load(open('$DEPLOY_JSON'))
          for k, v in data.items():
              print(f'{k}={v}')
          ")

      # ── Upload and deploy ────────────────────────────────────────────────────
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'html/'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
