name: STL Test (ASan/UBSan + MSan/UBSan)

on:
  pull_request:

jobs:
  stl-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install system dependencies
      run: bash install_requirements.sh

    - name: Add venv to PATH
      run: echo "$PWD/.venv/bin" >> $GITHUB_PATH

    - name: Build stl_test_asan and stl_test_msan
      run: scons stl_test_asan stl_test_msan

    - name: Run stl_test via pytest
      run: pytest test/test_stl.py -n auto --junitxml=results.xml -v

    - name: Publish test results
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: always()
      with:
        files: results.xml

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: stl-test-results
        path: results.xml

  stl-coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install system dependencies
      run: bash install_requirements.sh

    - name: Add venv to PATH
      run: echo "$PWD/.venv/bin" >> $GITHUB_PATH

    - name: Build stl_test_cov
      run: scons stl_test_cov

    - name: Run coverage
      run: pytest test/test_coverage.py -v

    - name: Post coverage comment
      uses: actions/github-script@v7
      if: github.event_name == 'pull_request'
      with:
        script: |
          const fs = require('fs');
          const summary = fs.readFileSync('coverage_profiles/summary.txt', 'utf8');
          const marker = '<!-- stl-coverage-report -->';
          const body = `${marker}\n## STL Mock Coverage\n\`\`\`\n${summary.trim()}\n\`\`\``;

          const {data: comments} = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          const existing = comments.find(c => c.body.includes(marker));
          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: stl-coverage-report
        path: coverage_html/
