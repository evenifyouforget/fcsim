name: STL Test (ASan/UBSan)

on:
  pull_request:
    branches:
      - main

jobs:
  stl-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install system dependencies
      run: bash install_requirements.sh

    - name: Add venv to PATH
      run: echo "$PWD/.venv/bin" >> $GITHUB_PATH

    - name: Build stl_test
      run: scons stl_test

    - name: Run stl_test via pytest
      run: pytest test/test_stl.py -n auto --junitxml=results.xml -v

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: stl-test-results
        path: results.xml
