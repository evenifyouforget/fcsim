name: STL Test (ASan/UBSan + MSan/UBSan)

on:
  pull_request:

jobs:
  stl-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install system dependencies
      run: bash install_requirements.sh

    - name: Add venv to PATH
      run: echo "$PWD/.venv/bin" >> $GITHUB_PATH

    - name: Build stl_test_asan and stl_test_msan
      run: scons stl_test_asan stl_test_msan

    - name: Run stl_test via pytest
      run: pytest test/test_stl.py -n auto --junitxml=results.xml -v

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: stl-test-results
        path: results.xml

  stl-coverage:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install system dependencies
      run: bash install_requirements.sh

    - name: Add venv to PATH
      run: echo "$PWD/.venv/bin" >> $GITHUB_PATH

    - name: Build stl_test_cov
      run: scons stl_test_cov

    - name: Run coverage
      run: pytest test/test_coverage.py -v

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: stl-coverage-report
        path: coverage_html/
